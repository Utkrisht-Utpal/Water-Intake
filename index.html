<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Intake Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="dashboard">
        <h2 class="water-intake" id="waterText">You Drank 0ml water today!</h2>
        <div class="water-home">
            <div class="glass">
                <img src="https://thumbs.dreamstime.com/b/glass-water-cartoon-vector-illustration-144223612.jpg" alt="water glass" class="water-glass">
                <div class="glasses">
                    <div class="glas1 glas" data-text="100">+100ml</div>
                    <div class="glas2 glas" data-text="250">+250ml</div>
                    <div class="glas3 glas" data-text="500">+500ml</div>
                    <div class="glas4 glas" data-text="1000">+1000ml</div>
                </div>
            </div>
        </div>
        <button id="resetbtn"><span>Reset</span></button>
    </div>
</body>

</html>
